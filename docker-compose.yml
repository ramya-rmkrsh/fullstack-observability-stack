
services:
  backend:
    labels:
      com.datadoghq.ad.logs: '[{"source":"python","service":"backend","log_processing_rules":[{"type":"include_at_match","name":"filter_debug","pattern":"INFO|WARNING|ERROR|CRITICAL"}]}]' # Log collection for backend service - very important for the DD to identify logs
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_PORT: 5432
      DD_TRACE_DEBUG: false
      DD_TRACE_ENABLED: true
      DD_SERVICE: backend
      DD_ENV: dev
      DD_VERSION: 1.0
      DD_LOG_LEVEL: INFO
      DD_AGENT_HOST: datadog
      DD_LOGS_ENABLED: true
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: true
      DD_TRACE_AGENT_PORT: 8126
      DD_REMOTE_CONFIGURATION_ENABLED: false

  frontend:
    labels:
      com.datadoghq.ad.logs: '[{"source":"nginx","service":"frontend","log_processing_rules":[{"type":"multi_line","name":"new_log_start_with_date","pattern":"\\d{4}-\\d{2}-\\d{2}"},{"type":"exclude_at_match","name":"exclude_entrypoint_noise","pattern":"docker-entrypoint"}]}]' # Log collection for frontend service - very important for the DD to identify logs by service
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    environment:
      - DD_SERVICE=frontend
      - DD_ENV=dev
      - DD_VERSION=1.0
      - DD_TRACE_ENABLED=false
      - DD_AGENT_HOST=datadog
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
    volumes:
      - /var/log/nginx:/var/log/nginx

  datadog:
    image: datadog/agent:latest
    container_name: datadog-agent-007
    ports: 
      - "8126:8126"  # APM tracing port
      - "10516:10516" # logs intake TCP
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE} 
      - DD_LOGS_ENABLED=true
      - DD_APM_ENABLED=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro

  db:
    image: postgres:15
    container_name: postgres-db
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    
volumes:
  postgres_data:
